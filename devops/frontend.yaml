---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        # Change 'mihirbindal' if your Docker Hub username is different
        image: mihirbindal/spe-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 9002
        # Tell the frontend exactly where to find the backend APIs inside the cluster
        env:
        - name: INGEST_URL
          value: "http://ingest-api:9000"
        - name: GENERATE_URL
          value: "http://generate-api:9001"

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-ui
spec:
  # We use a NodePort so you can access it from your laptop's browser
  type: NodePort 
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 9002
      targetPort: 9002
      # This explicitly opens port 30000 on your local machine
      nodePort: 30000