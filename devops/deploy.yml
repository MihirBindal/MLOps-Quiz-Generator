---
- name: Deploy SPE MLOps Architecture
  hosts: localhost
  connection: local
  gather_facts: false
  
  vars:
    project_dir: "/home/mihir/SPE/major"

  tasks:
    - name: Ensure the Qdrant storage directory exists securely
      file:
        path: "{{ project_dir }}/qdrant_storage"
        state: directory
        mode: '0755'

    - name: Deploy the new architecture via Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ project_dir }}"
        state: present
        pull: always
        remove_orphans: yes
      register: compose_output

    - name: Display Deployment Status
      debug:
        msg: "Deployment complete. Actions taken: {{ compose_output.actions }}"